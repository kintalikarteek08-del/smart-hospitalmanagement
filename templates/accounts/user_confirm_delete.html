{% extends 'base.html' %}
{% load static %}

{% block title %}Delete User | Smart Hospital Management{% endblock %}

{% block content %}
<form method="post" class="form-card delete-card">
    {% csrf_token %}
    <div class="delete-icon"><i class="fas fa-triangle-exclamation"></i></div>
    <h1 class="page-title">Delete User</h1>
    <p>Delete <strong>{{ user.get_full_name|default:user.username }}</strong>?</p>
    <div class="form-buttons">
        <button type="submit" class="btn-primary btn-danger-action">Delete</button>
        <a href="{% url 'accounts:user_list' %}" class="btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
